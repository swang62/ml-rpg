name: CI

on:
  push:
    branches: ["**"]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for GitLeaks
        uses: gacts/gitleaks@v1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v7
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}
      - name: Install Python deps
        run: uv sync --group dev --inexact
      - name: Lint & format check
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v7
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache uv venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}
      - name: Install Python deps
        run: uv sync --group dev --inexact
      - name: Download spaCy model
        run: uv run -- spacy download en_core_web_sm
      - name: Run tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: https://dev-ml-rpg.stevewang.dev
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache .vinxi
        uses: actions/cache@v5
        with:
          path: .vinxi
          key: vinxi-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: vinxi-
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build

  deploy-staging:
    needs: [lint, test, build]
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: https://dev-ml-rpg.stevewang.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Verify Cloudflare auth
        run: |
          echo "Account ID: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          npx wrangler d1 list 2>&1 | head -5 || echo "(d1 list failed — ok if token lacks read scope)"
      - name: Apply D1 migrations to staging
        run: |
          retry() {
            local max_attempts=3 delay=10 attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [[ $attempt -ge $max_attempts ]]; then
                echo "FAILED after $max_attempts attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt failed. Retrying in ${delay}s..." >&2
              sleep "$delay"
              ((attempt++))
            done
          }
          retry npx wrangler d1 migrations apply D1_CONTENT --remote --env staging </dev/null
      - name: Build Worker bundle
        run: pnpm build
      - name: Deploy main Worker to staging
        run: npx wrangler deploy --env staging
      - name: Deploy cron Worker to staging
        run: npx wrangler deploy --config cron/wrangler.jsonc --env staging

  deploy-production:
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: https://ml-rpg.stevewang.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Verify Cloudflare auth
        run: |
          echo "Account ID: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          npx wrangler d1 list 2>&1 | head -5 || echo "(d1 list failed — ok if token lacks read scope)"
      - name: Apply D1 migrations to production
        run: |
          retry() {
            local max_attempts=3 delay=10 attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [[ $attempt -ge $max_attempts ]]; then
                echo "FAILED after $max_attempts attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt failed. Retrying in ${delay}s..." >&2
              sleep "$delay"
              ((attempt++))
            done
          }
          retry npx wrangler d1 migrations apply D1_CONTENT --remote --env production </dev/null
      - name: Build Worker bundle
        run: pnpm build
      - name: Deploy main Worker to production
        run: npx wrangler deploy --env production
      - name: Deploy cron Worker to production
        run: npx wrangler deploy --config cron/wrangler.jsonc --env production
