name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for GitLeaks
        uses: gacts/gitleaks@v1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v5
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}
      - name: Install Python deps
        run: uv sync --group dev --inexact
      - name: Lint & format check
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v5
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}
      - name: Install Python deps
        run: uv sync --group dev --inexact
      - name: Download spaCy model
        run: uv run -- spacy download en_core_web_sm
      - name: Run tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Rebuild native modules for current Node version
        run: pnpm rebuild better-sqlite3
      - name: Cache .vinxi
        uses: actions/cache@v4
        with:
          path: .vinxi
          key: vinxi-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: vinxi-
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build

  deploy-staging:
    needs: [lint, test, build]
    if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules (needed by export-d1-content)
        run: pnpm rebuild better-sqlite3
      - name: Build Worker bundle
        run: pnpm build
      - name: Seed staging D1
        run: ./scripts/seed-staging.sh
      - name: Deploy to staging
        run: npx wrangler deploy --env staging

  deploy-production:
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-24-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3
      - name: Build Worker bundle
        run: pnpm build
      - name: Seed production D1
        run: ./scripts/seed-production.sh
      - name: Deploy to production
        run: npx wrangler deploy --env production
