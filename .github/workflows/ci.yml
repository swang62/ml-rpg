name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for GitLeaks
        uses: gacts/gitleaks@v1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Lint & format check
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v5
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}
      - name: Install Python deps
        run: uv sync --group dev --inexact
      - name: Download spaCy model
        run: uv run -- spacy download en_core_web_sm
      - name: Run tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Cache .vinxi
        uses: actions/cache@v4
        with:
          path: .vinxi
          key: vinxi-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: vinxi-
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build
