services:
  system-overflow:
    container_name: system-overflow
    image: swang62/system-overflow
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3333:3000"
    volumes:
      - xp-data:/app/.data/xp/prod
      - tracking-data:/app/.data/tracking/prod

volumes:
  xp-data:
  tracking-data:
