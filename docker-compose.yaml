# Docker Compose for LLM backend services (rag_api + llama_api) only.
# The frontend is deployed as a Cloudflare Worker — see README for staging deploy flow.
# For local development, run `pnpm dev` which starts rag_api, llama-server, and wrangler.

services:
  rag-api:
    build:
      context: .
      dockerfile: rag_api/Dockerfile
    restart: unless-stopped
    volumes:
      - course-data:/app/.data
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - LANCEDB_PATH=${LANCEDB_PATH:-/app/.data/search}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SESSION_SECRET=${SESSION_SECRET}
      - LLAMA_API_URL=http://${SERVICE_NAME_LLAMA_API}:9876
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 1m
      timeout: 10s
      start_period: 15s
      retries: 3

  llama-api:
    build:
      context: ./llama_api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - llama-model:/app/models
    environment:
      - HF_MODEL_REPO=scubastevve/ml-rpg-bob
      - HF_MODEL_FILE=bob.gguf
      - HF_TOKEN=${HF_TOKEN}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: curl -f http://127.0.0.1:9876/health || exit 0
      interval: 1m
      timeout: 5s
      start_period: 30s
      retries: 3
volumes:
  course-data:
  llama-model:
