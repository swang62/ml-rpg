services:
  ml-rpg:
    container_name: ml-rpg
    image: swang62/ml-rpg
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SITE_URL=${VITE_SITE_URL}
        - VITE_SITE_ID=${VITE_SITE_ID:-}
    restart: unless-stopped
    depends_on:
      - spacy-api
    ports:
      - ${PORT:-3333}:${PORT:-3333}
    volumes:
      - course-data:/app/.data
    environment:
      - COURSE_DB_PATH=${COURSE_DB_PATH:-/app/.data/course.db}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LANCEDB_PATH=${LANCEDB_PATH:-/app/.data/search}
      - PORT=${PORT:-3333}
      - SESSION_SECRET=${SESSION_SECRET}
      - SPACY_API_URL=http://spacy-api:8000
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT:-3333}/api/health || exit 1
      interval: 5m
      timeout: 10s
      start_period: 10s
      retries: 3

  spacy-api:
    container_name: spacy-api
    build:
      context: .
      dockerfile: spacy-api/Dockerfile
    restart: unless-stopped

volumes:
  course-data:
