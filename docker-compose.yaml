services:
  ml-rpg:
    container_name: ml-rpg
    image: swang62/ml-rpg
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SITE_URL=${VITE_SITE_URL}
        - VITE_SITE_ID=${VITE_SITE_ID:-}
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_healthy
      llama-api:
        condition: service_healthy
    ports:
      - ${PORT:-3333}:${PORT:-3333}
    volumes:
      - course-data:/app/.data
    environment:
      - COURSE_DB_PATH=${COURSE_DB_PATH:-/app/.data/course.db}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LANCEDB_PATH=${LANCEDB_PATH:-/app/.data/search}
      - PORT=${PORT:-3333}
      - SESSION_SECRET=${SESSION_SECRET}
      - RAG_API_URL=http://rag-api:8000
      - LLAMA_API_URL=http://llama-api:9876
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT:-3333}/api/health || exit 1
      interval: 1m
      timeout: 10s
      start_period: 10s
      retries: 3

  rag-api:
    container_name: rag-api
    build:
      context: .
      dockerfile: rag_api/Dockerfile
    restart: unless-stopped
    volumes:
      - course-data:/app/.data
    environment:
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - LANCEDB_PATH=${LANCEDB_PATH:-/app/.data/search}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')" ]
      interval: 1m
      timeout: 10s
      start_period: 15s
      retries: 3

  llama-api:
    container_name: llama-api
    build:
      context: ./llama_api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - llama-model:/app/models
    environment:
      - HF_MODEL_REPO=scubastevve/ml-rpg-bob
      - HF_MODEL_FILE=bob.gguf
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: curl -f http://127.0.0.1:9876/health || exit 0
      interval: 1m
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  course-data:
  llama-model:
